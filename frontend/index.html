<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>规则的起点 — 财税政策搜索引擎</title>
<style>
:root {
  --black: #111;
  --white: #fff;
  --g50: #fafafa;
  --g100: #f5f5f5;
  --g200: #e5e5e5;
  --g300: #d4d4d4;
  --g400: #a3a3a3;
  --g500: #737373;
  --g600: #525252;
  --g700: #404040;
  --g800: #262626;
  --g900: #171717;
  --accent: #dc2626;
  --panel-w: 420px;
  --readable: 720px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei","Noto Sans SC",sans-serif;
  background:var(--white);color:var(--black);line-height:1.7;
  -webkit-font-smoothing:antialiased;
}

/* ── Hero ── */
.hero{
  padding:100px 20px 40px;
  text-align:center;
  transition:padding .5s ease;
  max-width:var(--readable);
  margin:0 auto;
}
.hero.compact{padding:36px 20px 16px}
.hero-inner{max-width:560px;margin:0 auto}

.hero-logo{color:var(--black);margin-bottom:20px;display:inline-block}
.hero-logo svg{display:block}
.hero.compact .hero-logo svg{width:28px;height:28px}
.hero.compact .hero-logo{margin-bottom:10px}

.hero-title{
  font-size:clamp(28px,4.5vw,50px);
  font-weight:700;
  letter-spacing:8px;
  color:var(--black);
  margin-bottom:28px;
  transition:font-size .5s ease,margin .5s ease,letter-spacing .5s ease;
}
.hero.compact .hero-title{
  font-size:20px;
  letter-spacing:4px;
  margin-bottom:14px;
}

/* ── Search Box (red accent) ── */
.search-box{
  display:flex;
  max-width:520px;
  margin:0 auto;
  border:2px solid var(--accent);
  transition:box-shadow .2s;
}
.search-box:focus-within{
  box-shadow:0 0 0 3px rgba(220,38,38,.12);
}
.search-input{
  flex:1;min-width:0;
  padding:13px 16px;
  border:none;
  font-size:15px;
  outline:none;
  background:var(--white);
  color:var(--black);
}
.search-input::placeholder{color:var(--g400)}
.search-btn{
  padding:13px 24px;
  background:var(--accent);
  color:#fff;
  border:none;
  font-size:14px;
  font-weight:600;
  cursor:pointer;
  letter-spacing:2px;
  transition:opacity .15s;
  white-space:nowrap;
}
.search-btn:hover{opacity:.88}
.search-btn:disabled{opacity:.35;cursor:not-allowed}

/* ── Subtitle ── */
.hero-subtitle{
  font-size:13px;
  color:var(--g400);
  margin-top:18px;
  letter-spacing:1px;
  transition:opacity .4s;
}
.hero.compact .hero-subtitle{display:none}

/* ── Quick Tax (text links) ── */
.quick-tax{
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:6px;
  margin-top:18px;
  transition:opacity .3s;
}
.hero.compact .quick-tax{margin-top:10px}
.quick-tax button{
  padding:8px 4px;
  border:1px solid var(--g200);
  background:var(--white);
  font-size:13px;
  font-weight:600;
  color:var(--g600);
  cursor:pointer;
  border-radius:6px;
  transition:all .12s;
  text-align:center;
}
.quick-tax button:hover{
  border-color:var(--black);
  color:var(--black);
  background:var(--g50);
}

/* ── Toggle links ── */
.toggle-row{
  display:flex;
  justify-content:center;
  gap:20px;
  margin-top:14px;
  font-size:12.5px;
}
.toggle-row span{
  color:var(--g400);
  cursor:pointer;
  transition:color .12s;
  letter-spacing:.5px;
  user-select:none;
}
.toggle-row span:hover{color:var(--black)}

/* ── Filters bar ── */
.filters-bar{
  max-width:var(--readable);
  margin:0 auto;
  padding:12px 16px 16px;
  display:none;
  flex-wrap:wrap;
  gap:8px 14px;
  align-items:center;
  border-bottom:1px solid var(--g100);
}
.filters-bar.open{display:flex}
.filter-group{
  display:flex;
  align-items:center;
  gap:4px;
  font-size:12px;
  color:var(--g500);
}
.filter-group select,.filter-group input{
  padding:4px 8px;
  border:1px solid var(--g200);
  border-radius:2px;
  font-size:12px;
  outline:none;
  background:var(--white);
  color:var(--black);
  font-family:inherit;
}
.filter-group select:focus,.filter-group input:focus{
  border-color:var(--black);
}

/* ── Results ── */
.results-area{padding:0 20px 60px;max-width:var(--readable);margin:0 auto}
.meta-bar{
  display:flex;
  align-items:center;
  gap:10px;
  padding:14px 0;
  font-size:12px;
  color:var(--g500);
  flex-wrap:wrap;
  border-bottom:1px solid var(--g100);
}
.tag{
  display:inline-flex;
  align-items:center;
  gap:3px;
  padding:2px 8px;
  border:1px solid var(--g200);
  border-radius:2px;
  font-size:11px;
  color:var(--g600);
}
.tag-intent{border-color:var(--g300);color:var(--g700)}
.tag-source{border-color:var(--g300);color:var(--g700)}
.tag-time{border-color:var(--g200);color:var(--g500)}
.tag-count{border-color:var(--g200);color:var(--g700);font-weight:600}

.source-label{
  display:inline-flex;align-items:center;gap:2px;
  padding:1px 6px;border:1px solid var(--g200);
  border-radius:2px;font-size:10.5px;
}
.src-npc{border-color:var(--g300)}
.src-chinatax{border-color:var(--g300)}
.src-anysearch{border-color:var(--g300)}

.result-card{
  padding:16px 0;
  border-bottom:1px solid var(--g100);
  cursor:pointer;
  transition:background .12s;
}
.result-card:hover{background:var(--g50);margin:0 -12px;padding:16px 12px;border-bottom-color:var(--g200)}
.result-card .title{font-size:15px;font-weight:600;margin-bottom:5px;line-height:1.5}
.result-card .meta{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
  font-size:12px;
  color:var(--g500);
}
.result-card .meta span{display:inline-flex;align-items:center;gap:3px}
.result-card .id-row{font-size:10.5px;color:var(--g400);font-family:monospace;margin-top:3px}

.status-badge{
  display:inline-flex;align-items:center;gap:3px;
  padding:2px 7px;border:1px solid var(--g200);
  border-radius:2px;font-size:11px;font-weight:500;
}
.s-effective{border-color:var(--g300);color:var(--g700)}
.s-amended{border-color:var(--g300);color:var(--g600)}
.s-abolished{border-color:var(--g300);color:var(--g500)}
.s-pending{border-color:var(--g300);color:var(--g600)}

.empty-state,.loading-state{text-align:center;padding:60px 20px;color:var(--g500)}
.empty-state p{color:var(--g400)}
.loading-spinner{
  width:28px;height:28px;
  border:2px solid var(--g200);
  border-top-color:var(--black);
  border-radius:50%;
  animation:spin .7s linear infinite;
  margin:0 auto 12px;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Modal ── */
.modal-overlay{
  position:fixed;inset:0;
  background:#00000060;
  z-index:1000;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
  animation:fadeIn .2s;
}
@keyframes fadeIn{from{opacity:0}}
.modal{
  background:var(--white);
  border:1px solid var(--g200);
  width:100%;
  max-width:820px;
  max-height:88vh;
  display:flex;
  flex-direction:column;
  box-shadow:0 8px 40px rgba(0,0,0,.08);
}
.modal-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px;border-bottom:1px solid var(--g200);flex-shrink:0;
}
.modal-header h2{font-size:15px;margin:0;flex:1;padding-right:12px;font-weight:600}
.modal-header .close-btn{
  width:32px;height:32px;border:none;background:none;
  font-size:20px;cursor:pointer;border-radius:2px;color:var(--g500);
}
.modal-header .close-btn:hover{background:var(--g50)}
.modal-body{flex:1;overflow-y:auto;padding:0;font-size:14px;line-height:1.9;min-height:300px;position:relative}
.modal-body .tab-panel{display:none;min-height:300px}
.modal-body .tab-panel.active{display:block}
.modal-body .body-padded{padding:16px 24px}
.modal-footer{
  display:flex;gap:8px;padding:10px 20px;
  border-top:1px solid var(--g200);flex-shrink:0;justify-content:flex-end;
}
.modal-footer button{
  padding:6px 16px;border:1px solid var(--g200);
  border-radius:2px;font-size:12.5px;cursor:pointer;background:var(--white);
}
.modal-footer button:hover{background:var(--g50)}
.modal-footer button.primary{
  background:var(--black);color:#fff;border-color:var(--black);
}
.modal-footer button.primary:hover{background:var(--g800)}

/* ── Modal Tabs ── */
.modal-tabs{
  display:flex;border-bottom:1px solid var(--g200);
  flex-shrink:0;padding:0 20px;background:var(--g50);
}
.modal-tabs .tab-btn{
  padding:9px 16px;border:none;background:none;
  font-size:13px;font-weight:500;color:var(--g500);
  cursor:pointer;border-bottom:2px solid transparent;
  margin-bottom:-1px;transition:all .15s;
}
.modal-tabs .tab-btn:hover{color:var(--black)}
.modal-tabs .tab-btn.active{color:var(--black);border-bottom-color:var(--black);font-weight:600}

/* ── Tab: Law Text ── */
.modal-body mark{background:#f5f5f5;color:var(--black);padding:0 2px;border-radius:1px;font-weight:600}
.modal-body .chapter{font-weight:700;font-size:14px;margin:18px 0 8px;color:var(--black);padding-bottom:3px;border-bottom:1px solid var(--g100)}
.modal-body .chapter:first-child{margin-top:0}
.modal-body .article{font-weight:600;margin:12px 0 3px;color:var(--g800)}
.modal-body .body-text{margin:2px 0;color:var(--g700);text-indent:2em}
.modal-body .meta-note{
  background:var(--g50);padding:10px 16px;margin-bottom:14px;
  font-size:12px;color:var(--g500);display:flex;gap:14px;flex-wrap:wrap;
}

/* ── Tab: Interpretations ── */
.interp-card{
  display:block;padding:14px 18px;
  border-bottom:1px solid var(--g100);
  text-decoration:none;color:var(--black);transition:background .12s;
}
.interp-card:hover{background:var(--g50)}
.interp-card .it{font-size:13.5px;font-weight:600;margin-bottom:3px}
.interp-card .im{font-size:12px;color:var(--g500);display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.interp-card .is{
  display:inline-flex;align-items:center;gap:2px;
  padding:1px 6px;border:1px solid var(--g200);
  border-radius:2px;font-size:10.5px;
}
.is-official{border-color:var(--g300);color:var(--g700)}
.is-practical{border-color:var(--g300);color:var(--g700)}
.is-web{border-color:var(--g200);color:var(--g500)}
.interp-empty{text-align:center;padding:40px 20px;color:var(--g500)}

/* ── Guidance Panel ── */
.guidance-panel{
  position:fixed;top:0;right:0;bottom:0;
  width:var(--panel-w);
  background:var(--white);
  border-left:1px solid var(--g200);
  z-index:500;
  display:flex;
  flex-direction:column;
  transform:translateX(100%);
  transition:transform .25s;
}
.guidance-panel.open{transform:translateX(0)}
.guidance-panel .gp-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px;border-bottom:1px solid var(--g200);flex-shrink:0;
}
.guidance-panel .gp-header h3{font-size:15px;font-weight:600}
.guidance-panel .gp-body{flex:1;overflow-y:auto;padding:18px}
.guidance-panel .gp-body .step{margin-bottom:18px}
.guidance-panel .gp-body .step-label{
  font-size:10.5px;color:var(--g400);
  text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px;
}
.guidance-panel .gp-body .step-question{font-size:14px;font-weight:600;margin-bottom:10px}
.guidance-panel .gp-body .choice-grid{display:flex;flex-wrap:wrap;gap:5px}
.guidance-panel .gp-body .choice{
  flex:1 1 calc(50% - 5px);min-width:90px;
  padding:12px 8px;
  border:1px solid var(--g200);
  border-radius:2px;
  text-align:center;cursor:pointer;font-size:13px;
  transition:all .12s;background:var(--white);color:var(--g600);
}
.guidance-panel .gp-body .choice:hover{border-color:var(--black);color:var(--black)}
.guidance-panel .gp-body .choice.picked{border-color:var(--black);background:var(--g50);color:var(--black);font-weight:600}
.guidance-panel .gp-body .choice .ci{font-size:18px;display:block;margin-bottom:2px}
.guidance-panel .gp-body .choice .cl{display:block;font-size:11px;color:var(--g400);margin-top:2px}
.guidance-panel .gp-footer{padding:12px 18px;border-top:1px solid var(--g200);flex-shrink:0}
.guidance-panel .gp-footer button{
  width:100%;padding:9px;
  background:var(--black);color:#fff;
  border:none;font-size:14px;font-weight:600;cursor:pointer;
}
.guidance-panel .gp-footer button:disabled{opacity:.3;cursor:not-allowed}
.guidance-panel .gp-footer button:hover:not(:disabled){background:var(--g800)}
.guidance-panel .gp-footer .reset{
  background:none;color:var(--g500);font-size:12px;margin-top:4px;width:100%;
}
.guidance-panel .gp-footer .reset:hover{color:var(--black);background:none}

/* ── Footer ── */
.page-footer{
  text-align:center;
  padding:28px 20px 20px;
  font-size:11px;
  color:var(--g400);
  letter-spacing:.3px;
  border-top:1px solid var(--g50);
  margin-top:20px;
}
.page-footer a{color:var(--g500);text-decoration:none}
.page-footer a:hover{color:var(--black)}

/* ── Responsive ── */
@media(max-width:800px){
  .hero{padding:60px 16px 28px}
  .hero.compact{padding:24px 16px 12px}
  .hero-title{font-size:clamp(24px,6vw,36px);letter-spacing:4px}
  .search-box{max-width:100%}
  .search-input{padding:11px 14px;font-size:14px}
  .search-btn{padding:11px 18px;font-size:13px}
  .quick-tax{grid-template-columns:repeat(3,1fr);gap:4px}
  .quick-tax button{padding:6px 4px;font-size:12px}
  .filters-bar{gap:6px 10px;padding:10px 12px}
  .guidance-panel{width:100%}
  .results-area{padding:0 12px 40px}
  .modal{max-width:100%;max-height:95vh;margin:8px;border:none}
  .modal-body .body-padded{padding:12px 16px}
  .modal-tabs{overflow-x:auto;padding:0 12px}
  .modal-tabs .tab-btn{padding:8px 12px;font-size:12px}
  .toggle-row{flex-direction:column;gap:6px;align-items:center}
}
</style>
</head>
<body>

<!-- ═══ HERO ═══ -->
<div class="hero" id="heroSection">
  <div class="hero-inner">
    <div class="hero-logo">
      <svg viewBox="0 0 40 40" width="36" height="36" fill="none">
        <rect x="4" y="4" width="32" height="32" rx="3" stroke="currentColor" stroke-width="1.5"/>
        <line x1="10" y1="14" x2="30" y2="14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="10" y1="20" x2="30" y2="20" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="10" y1="26" x2="22" y2="26" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>

    <h1 class="hero-title">规则的起点</h1>

    <div class="search-box">
      <input type="text" class="search-input" id="searchInput"
        placeholder="搜索税收政策关键词…" autofocus>
      <button class="search-btn" id="searchBtn" onclick="doSearch()">搜索</button>
    </div>

    <p class="hero-subtitle">数据源自国家法规库 · 实时同步 · 现行有效</p>

    <div class="quick-tax" id="quickTax"></div>

    <div class="toggle-row">
      <span onclick="toggleFilters()">高级筛选 ▾</span>
      <span onclick="toggleGuidance()">智能引导</span>
    </div>
  </div>
</div>

<!-- ═══ FILTERS ═══ -->
<div class="filters-bar" id="filtersBar">
  <div class="filter-group"><label>范围</label><select id="filterScope"><option value="title">标题</option><option value="fulltext" selected>全文</option></select></div>
  <div class="filter-group"><label>匹配</label><select id="filterType"><option value="fuzzy">模糊</option><option value="exact">精确</option></select></div>
  <div class="filter-group"><label>时效</label><select id="filterStatus"><option value="3" selected>现行有效</option><option value="">全部</option></select></div>
  <div class="filter-group"><label>排序</label><select id="filterSort"><option value="relevance">相关度</option><option value="date">日期↓</option></select></div>
  <div class="filter-group"><label>数据源</label><select id="filterSource"><option value="npc">NPC法规库</option><option value="aggregated">多源聚合</option><option value="chinatax">税务总局</option></select></div>
  <div class="filter-group"><label>省份</label><select id="filterProvince"><option value="">全国</option></select></div>
  <div class="filter-group"><label>日期</label><input type="date" id="filterDateFrom">—<input type="date" id="filterDateTo"></div>
</div>

<!-- ═══ RESULTS ═══ -->
<div class="results-area">
  <div id="resultsContainer"></div>
</div>

<!-- ═══ FOOTER ═══ -->
<div class="page-footer">
  数据源：<a href="https://flk.npc.gov.cn" target="_blank" rel="noopener">国家法律法规数据库</a> ·
  <a href="https://www.chinatax.gov.cn" target="_blank" rel="noopener">国家税务总局</a> ·
  财税实务公众号<br>
  搜索结果仅供参考，以官方发布为准
</div>

<!-- ═══ GUIDANCE PANEL ═══ -->
<div class="guidance-panel" id="guidancePanel">
  <div class="gp-header">
    <h3>智能引导</h3>
    <button style="background:none;border:none;font-size:18px;cursor:pointer;color:var(--g500)" onclick="toggleGuidance()">✕</button>
  </div>
  <div class="gp-body" id="guideBody"></div>
  <div class="gp-footer" id="guideFooter"></div>
</div>

<!-- ═══ MODAL ═══ -->
<div id="modalOverlay" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeModal()"></div>

<script>
/* ═══════════ STATE ═══════════ */
let lastResults=[],lastKeyword='',guideState={},activeTab='law';
const NEXT_STEP={user_type:'tax_type',tax_type:'intent',intent:'conditions'};

document.addEventListener('DOMContentLoaded',()=>{
  loadQuickTax();loadProvinces();renderGuideStep('user_type');
  document.getElementById('searchInput').addEventListener('keydown',e=>{if(e.key==='Enter')doSearch();});
});

/* ═══════════ GARBAGE FILTER ═══════════ */
const _GARBAGE_TITLES=['游戏','小游戏','攻略','视频','电影','电视剧','综艺','下载','app下载','安装','破解','会员','充值','美女','八卦','娱乐','体育','足球','NBA','4399','7k7k'];
function _isGarbage(title){for(const k of _GARBAGE_TITLES){if((title||'').includes(k))return true;}return false;}

/* ═══════════ TOGGLES ═══════════ */
function toggleFilters(){
  const bar=document.getElementById('filtersBar');
  bar.classList.toggle('open');
}

/* ═══════════ QUICK TAX ═══════════ */
async function loadQuickTax(){
  try{const types=await fetchWithRetry('/api/quick-tax-types');
  document.getElementById('quickTax').innerHTML=types.map(t=>
    `<button onclick="pickTax('${t.keyword}')">${t.label}</button>`
  ).join('');
  }catch(e){
    document.getElementById('quickTax').innerHTML='<span style="font-size:12px;color:var(--g400)">加载中…</span>';
  }
}
function pickTax(kw){document.getElementById('searchInput').value=kw;document.getElementById('searchInput').focus();}

async function loadProvinces(){
  const sel=document.getElementById('filterProvince');

/* ═══════════ SEARCH ═══════════ */
async function fetchWithRetry(url,opts={},retries=3,delay=800){
  for(let i=0;i<retries;i++){
    try{
      const r=await fetch(url,opts);
      const text=await r.text();
      if(!text||text.trim()===''){
        if(i<retries-1){await new Promise(x=>setTimeout(x,delay*(i+1)));continue;}
        throw new Error('服务返回空响应，请刷新重试');
      }
      try{return JSON.parse(text);}catch(e){
        if(i<retries-1){await new Promise(x=>setTimeout(x,delay*(i+1)));continue;}
        throw new Error('响应格式异常: '+text.slice(0,80));
      }
    }catch(e){
      if(e.name==='TypeError'||e.message.includes('Failed to fetch')||e.message.includes('NetworkError')){
        if(i<retries-1){
          const c=document.getElementById('resultsContainer');
          c.innerHTML=`<div class="loading-state"><div class="loading-spinner"></div><p>连接不稳定，正在重试…</p><p style="font-size:12px;color:var(--g400)">第 ${i+2}/${retries} 次尝试</p></div>`;
          await new Promise(x=>setTimeout(x,delay*(i+1)));
          continue;
        }
        throw new Error('网络连接失败，请检查网络后刷新页面重试');
      }
      throw e;
    }
  }
  throw new Error('请求失败，已达最大重试次数');
}

async function doSearch(){
  const keyword=document.getElementById('searchInput').value.trim();if(!keyword)return;
  const c=document.getElementById('resultsContainer'),btn=document.getElementById('searchBtn');
  c.innerHTML=`<div class="loading-state"><div class="loading-spinner"></div><p>正在查询…</p><p style="font-size:12px;color:var(--g400)">"${esc(keyword)}"</p></div>`;
  btn.disabled=true;btn.textContent='查询中…';
  try{
    const payload={
      keyword,scope:document.getElementById('filterScope').value,
      exact:document.getElementById('filterType').value==='exact',
      status:parseInt(document.getElementById('filterStatus').value)||null,
      sort:document.getElementById('filterSort').value,
      source:document.getElementById('filterSource').value,
      province:document.getElementById('filterProvince').value,
      date_from:document.getElementById('filterDateFrom').value||null,
      date_to:document.getElementById('filterDateTo').value||null,
    };
    const data=await fetchWithRetry('/api/search',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    lastResults=(data.result?.results||data.result?.items||[]).filter(function(r){return !_isGarbage(r.title);});lastKeyword=keyword;
    renderResults(data);
    document.getElementById('heroSection').classList.add('compact');
  }catch(e){c.innerHTML=`<div class="empty-state"><div class="icon" style="font-size:28px;margin-bottom:8px">—</div><p><b>查询失败</b></p><p style="font-size:13px;color:var(--g400)">${esc(e.message)}</p><p style="font-size:12px;margin-top:8px;color:var(--g400)">已自动重试 3 次 · 请稍后再试</p></div>`}
  finally{btn.disabled=false;btn.textContent='搜索';}
}

function renderResults(data){
  const c=document.getElementById('resultsContainer'),result=data.result,items=result?.results||result?.items||[];
  const total=result?.total||result?.total_items||items.length,searchedAt=result?.searched_at||'';
  const cacheTag=result?._from_cache?' [缓存]':'';
  const srcLabels={npc:'NPC国家法规库',chinatax:'国家税务总局',anysearch:'AnySearch'};
  const srcIcons={npc:'📜',chinatax:'🏛️',anysearch:'🌐'};
  const statusMap={1:'s-abolished',2:'s-amended',3:'s-effective',4:'s-pending'};
  const statusIcons={1:'🔴',2:'🟡',3:'🟢',4:'🔵'};
  const statusNames={1:'已废止',2:'已修改',3:'现行有效',4:'尚未生效'};

  let h='';
  if(items.length>0||total>0){
    h+='<div class="meta-bar">';
    if(data.intent_label)h+=`<span class="tag tag-intent">🎯 ${data.intent_label}</span>`;
    if(data.tax_type)h+=`<span class="tag tag-source">📂 ${data.tax_type}</span>`;
    if(data.province)h+=`<span class="tag" style="border-color:var(--g300);color:var(--g700)">📍 ${getProvinceName(data.province)}</span>`;
    h+=`<span class="tag tag-count">📋 ${total}条</span>`;
    if(searchedAt)h+=`<span class="tag tag-time">🕐 ${searchedAt}${cacheTag}</span>`;
    h+='</div>';
  }
  if(result?.source_summary){const s=result.source_summary;h+='<div class="meta-bar">';if(s.npc)h+=`<span class="source-label src-npc">📜 NPC ${s.npc}条</span>`;if(s.chinatax)h+=`<span class="source-label src-chinatax">🏛️ 总局 ${s.chinatax}条</span>`;if(s.anysearch)h+=`<span class="source-label src-anysearch">🌐 网页 ${s.anysearch}条</span>`;h+='</div>';}
  if(items.length===0){h+=`<div class="empty-state"><div style="font-size:28px;margin-bottom:8px">🔍</div><p><b>未找到相关政策</b></p><p style="font-size:13px;color:var(--g400)">关键词:"${esc(data.keyword)}"</p><p style="font-size:12px;margin-top:8px;color:var(--g400)">试试更宽泛的关键词 / 切换到"全文"搜索 / 使用"多源聚合"模式</p></div>`;}

  items.forEach((item,i)=>{
    const sc=statusMap[item.status_code]||'',st=highlightText(item.title,lastKeyword),sid=item.id||'',rawTitle=esc(item.title);
    h+=`<div class="result-card" onclick="viewLaw('${sid}','${rawTitle.replace(/'/g,"\\'")}')">
      <div class="title"><span style="font-size:11px;color:var(--g400);margin-right:6px">#${i+1}</span> ${item._source?`<span class="source-label src-${item._source}">${srcIcons[item._source]||''} ${srcLabels[item._source]||''}</span>`:''}${st}</div>
      <div class="meta">${item.status_code?`<span><span class="status-badge ${sc}">${statusIcons[item.status_code]||'❓'} ${statusNames[item.status_code]||item.status}</span></span>`:''}${item.publish_date?`<span>📅 公布:${item.publish_date}</span>`:''}${item.effective_date?`<span>施行:${item.effective_date}</span>`:''}${item.issuing_authority?`<span>🏛️ ${esc(item.issuing_authority)}</span>`:''}</div>
      <div class="id-row">NPC ID: ${sid}</div></div>`;
  });
  if(total>items.length)h+=`<p style="text-align:center;font-size:12px;color:var(--g400);margin-top:12px">显示前${items.length}条，共${total}条 · 缩小搜索范围以获取更精确结果</p>`;
  c.innerHTML=h;
}

/* ═══════════ KEYWORD HIGHLIGHT ═══════════ */
function highlightText(text,kw){if(!kw||!text)return esc(text);let r=esc(text);const tokens=kw.split(/\s+/).filter(t=>t.length>=1).sort((a,b)=>b.length-a.length);tokens.forEach(t=>{const e=t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');r=r.replace(new RegExp(`(${e})`,'gi'),'<mark>$1</mark>');});return r;}

/* ═══════════ LAW TEXT TAB ═══════════ */
function renderLawTextTab(data,bbbsId,title){
  const d=data.detail,kw=lastKeyword;
  let body=`<div class="meta-note"><span>📅 公布:${d.publish_date||'?'}</span><span>施行:${d.effective_date||'?'}</span><span>${['','🔴已废止','🟡已修改','🟢现行有效','🔵尚未生效'][d.status_code||3]||''}</span><span>🏛️ ${d.issuing_authority||''}</span><span>📝 ${data.article_count}条法条</span>${kw?`<span>🔍 高亮:"${esc(kw)}"</span>`:''}</div>`;
  if(!data.sections||data.sections.length===0){body+='<div class="interp-empty">未能获取法规全文</div>';}
  else{data.sections.forEach(s=>{const h=highlightText(s.text,kw);if(s.type==='chapter')body+=`<div class="chapter">${h}</div>`;else if(s.type==='heading')body+=`<div class="chapter" style="font-size:13px;border:none;margin:8px 0 4px">${h}</div>`;else if(s.type==='article')body+=`<div class="article">${h}</div>`;else if(s.text.trim())body+=`<div class="body-text">${h}</div>`;});}
  document.getElementById('tabLawContent').innerHTML=`<div class="body-padded">${body}</div>`;
}

function switchTab(tab){
  activeTab=tab;
  document.querySelectorAll('.modal-body .tab-panel').forEach(el=>el.classList.remove('active'));
  const panel=document.getElementById('tab'+tab.charAt(0).toUpperCase()+tab.slice(1)+'Content');
  if(panel)panel.classList.add('active');
  document.querySelectorAll('.modal-tabs .tab-btn').forEach(b=>b.classList.remove('active'));
  const btn=document.getElementById('tabBtn'+tab.charAt(0).toUpperCase()+tab.slice(1));
  if(btn)btn.classList.add('active');
  if(tab==='interp')loadInterpretationsTab(_modalLawId);
  if(tab==='web')loadWebRelatedTab(_modalLawId,_modalTitle);
  const footerLabels={law:'实时获取自NPC国家法规库',interp:'搜索自 chinatax.gov.cn · mof.gov.cn · gov.cn（仅官方来源）',ai:'AI 生成 · 仅供参考 · 以官方为准',web:'搜索自公众号 + 实务网络（含小颖言税/税海涛声/会计网等）'};
  document.getElementById('footerInfo').textContent=footerLabels[tab]||'';
}

  guideState.step=step;const body=document.getElementById('guideBody'),foot=document.getElementById('guideFooter');
  if(step==='user_type'){body.innerHTML=`<div class="step"><div class="step-label">Step 1/4</div><div class="step-question">你的身份是？</div><div class="choice-grid"><div class="choice${guideState.user_type==='enterprise'?' picked':''}" onclick="guidePick('user_type','enterprise')"><span class="ci">🏢</span>企业</div><div class="choice${guideState.user_type==='individual'?' picked':''}" onclick="guidePick('user_type','individual')"><span class="ci">👤</span>个人 / 个体户</div><div class="choice${guideState.user_type==='agent'?' picked':''}" onclick="guidePick('user_type','agent')"><span class="ci">📋</span>代理记账 / 税务师</div><div class="choice${guideState.user_type==='other'?' picked':''}" onclick="guidePick('user_type','other')"><span class="ci">💬</span>其他</div></div></div>`;foot.innerHTML='<button disabled>点击选项自动进入下一步</button>';}
  else if(step==='tax_type'){const idLabels={enterprise:'企业',individual:'个人/个体户',agent:'代理记账/税务师',other:''};const idLabel=idLabels[guideState.user_type]||'';let ch=[{v:'vat',icon:'📊',label:'增值税',desc:'流转税核心'},{v:'cit',icon:'🏢',label:'企业所得税',desc:'利润征税'},{v:'iit',icon:'👤',label:'个人所得税',desc:'工资/劳务/经营'},{v:'invoice',icon:'🧾',label:'发票管理',desc:'开票/抵扣/红冲'},{v:'prefer',icon:'🎁',label:'税收优惠',desc:'减免/退税'},{v:'stamp',icon:'📝',label:'印花税',desc:'合同/账簿'},{v:'deed',icon:'🔑',label:'契税',desc:'不动产登记'},{v:'property',icon:'🏠',label:'房产税',desc:'房屋租赁'},{v:'consumption',icon:'🛒',label:'消费税',desc:'特定消费品'},{v:'tariff',icon:'🚢',label:'关税',desc:'进出口'},{v:'land_vat',icon:'🏗️',label:'土地增值税',desc:'房地产'},{v:'admin',icon:'⚖️',label:'税收征管',desc:'登记/申报/稽查'}];body.innerHTML=`<div class="step"><div class="step-label">Step 2/4 ${idLabel?'· '+idLabel:''}</div><div class="step-question">你想了解哪个税种？</div><div class="choice-grid">${ch.map(c=>`<div class="choice${guideState.tax_type===c.v?' picked':''}" onclick="guidePick('tax_type','${c.v}')"><span class="ci">${c.icon}</span>${c.label}<span class="cl">${c.desc}</span></div>`).join('')}</div></div>`;foot.innerHTML=`<button onclick="renderGuideStep('intent')">跳过手动选择 →</button>${guideState.user_type?`<button class="reset" onclick="renderGuideStep('user_type')">← 返回修改</button>`:''}`;}
  else if(step==='intent'){const tl={vat:'增值税',cit:'企业所得税',iit:'个人所得税',invoice:'发票管理',prefer:'税收优惠',stamp:'印花税',deed:'契税',property:'房产税',consumption:'消费税',tariff:'关税',land_vat:'土地增值税',admin:'税收征管'};const tLabel=tl[guideState.tax_type]||guideState.tax_type||'';body.innerHTML=`<div class="step"><div class="step-label">Step 3/4${tLabel?' · '+tLabel:''}</div><div class="step-question">你想了解什么？</div><div class="choice-grid"><div class="choice${guideState.intent==='policy'?' picked':''}" onclick="guidePick('intent','policy')"><span class="ci">📖</span>查政策 / 税率<span class="cl">具体规定、税率标准</span></div><div class="choice${guideState.intent==='preference'?' picked':''}" onclick="guidePick('intent','preference')"><span class="ci">🎁</span>优惠资格<span class="cl">能否享受减免/退税</span></div><div class="choice${guideState.intent==='risk'?' picked':''}" onclick="guidePick('intent','risk')"><span class="ci">⚠️</span>风险自查<span class="cl">金税四期/合规</span></div><div class="choice${guideState.intent==='filing'?' picked':''}" onclick="guidePick('intent','filing')"><span class="ci">📋</span>申报流程<span class="cl">怎么申报/截止日期</span></div><div class="choice${guideState.intent==='invoice'?' picked':''}" onclick="guidePick('intent','invoice')"><span class="ci">🧾</span>发票问题<span class="cl">开票/遗失/红冲</span></div><div class="choice${guideState.intent==='calc'?' picked':''}" onclick="guidePick('intent','calc')"><span class="ci">🔢</span>计算/标准<span class="cl">起征点/扣除标准</span></div></div></div>`;foot.innerHTML=`<button onclick="renderGuideStep('conditions')">跳过手动选择 →</button><button class="reset" onclick="renderGuideStep('tax_type')">← 返回修改</button>`;}
  else{const tl={vat:'增值税',cit:'企业所得税',iit:'个人所得税',invoice:'发票管理',prefer:'税收优惠'};const il={policy:'查政策',preference:'优惠资格',risk:'风险自查',filing:'申报流程',invoice:'发票问题',calc:'计算标准'};const tLabel=tl[guideState.tax_type]||guideState.tax_type||'';const iLabel=il[guideState.intent]||guideState.intent||'';body.innerHTML=`<div class="step"><div class="step-label">Step 4/4${tLabel?' · '+tLabel:''}${iLabel?' · '+iLabel:''}</div><div class="step-question">补充条件（可选，可多选）</div><div class="choice-grid"><div class="choice${guideState.enterprise_type==='small'?' picked':''}" onclick="guidePick('enterprise_type','small')"><span class="ci">🏪</span>小规模纳税人<span class="cl">年应税≤500万</span></div><div class="choice${guideState.enterprise_type==='general'?' picked':''}" onclick="guidePick('enterprise_type','general')"><span class="ci">🏭</span>一般纳税人</div><div class="choice${guideState.enterprise_type==='micro'?' picked':''}" onclick="guidePick('enterprise_type','micro')"><span class="ci">🌱</span>小微企业<span class="cl">利润≤300万</span></div><div class="choice${guideState.enterprise_type==='hitech'?' picked':''}" onclick="guidePick('enterprise_type','hitech')"><span class="ci">🔬</span>高新技术企业</div><div class="choice${guideState.timeframe==='latest'?' picked':''}" onclick="guidePick('timeframe','latest')"><span class="ci">🆕</span>只看最新政策</div><div class="choice${guideState.timeframe==='2024'?' picked':''}" onclick="guidePick('timeframe','2024')"><span class="ci">📅</span>2024年以来的</div><div class="choice${guideState.region==='national'?' picked':''}" onclick="guidePick('region','national')"><span class="ci">🇨🇳</span>全国性政策</div><div class="choice${guideState.region==='local'?' picked':''}" onclick="guidePick('region','local')"><span class="ci">📍</span>也看地方性法规</div></div><div style="margin-top:14px"><div style="font-size:12px;color:var(--g500);margin-bottom:4px">或直接输入关键词：</div><input type="text" id="customKeyword" style="width:100%;padding:8px 12px;border:1px solid var(--g200);font-size:13px;background:var(--white);color:var(--black)" placeholder="例如：研发费用加计扣除、留抵退税…"></div></div>`;foot.innerHTML=`<button onclick="executeGuidedSearch()">🔍 生成搜索 →</button><button class="reset" onclick="renderGuideStep('intent')">← 返回修改</button>`;}
}

function executeGuidedSearch(){const taxMap={vat:'增值税',cit:'企业所得税',iit:'个人所得税',invoice:'发票管理办法',prefer:'税收优惠',stamp:'印花税',deed:'契税',property:'房产税',consumption:'消费税',tariff:'关税',land_vat:'土地增值税',admin:'税收征收管理法'};const intentMap={policy:'',preference:'优惠',risk:'风险 合规',filing:'申报',invoice:'发票',calc:'标准 扣除'};const entMap={small:'小规模纳税人',general:'一般纳税人',micro:'小微企业',hitech:'高新技术企业'};let parts=[];const taxK=guideState.tax_type?taxMap[guideState.tax_type]||guideState.tax_type:'';if(taxK)parts.push(taxK);if(guideState.intent&&intentMap[guideState.intent])parts.push(intentMap[guideState.intent]);if(guideState.enterprise_type&&entMap[guideState.enterprise_type])parts.push(entMap[guideState.enterprise_type]);const custom=document.getElementById('customKeyword')?.value?.trim();if(custom)parts.push(custom);document.getElementById('searchInput').value=parts.join(' ')||'增值税';if(guideState.timeframe==='latest')document.getElementById('filterSort').value='date';if(guideState.timeframe==='2024')document.getElementById('filterDateFrom').value='2024-01-01';if(guideState.region==='local')document.getElementById('filterStatus').value='';toggleGuidance();doSearch();}

function getProvinceName(sub){const m={beijing:'北京',shanghai:'上海',tianjin:'天津',chongqing:'重庆',guangdong:'广东',shenzhen:'深圳',zhejiang:'浙江',jiangsu:'江苏',shandong:'山东',sichuan:'四川',hubei:'湖北',hunan:'湖南',henan:'河南',hebei:'河北',fujian:'福建',xiamen:'厦门',anhui:'安徽',liaoning:'辽宁',dalian:'大连',jilin:'吉林',heilongjiang:'黑龙江',jiangxi:'江西',shanxi:'山西',shaanxi:'陕西',gansu:'甘肃',qinghai:'青海',yunnan:'云南',guizhou:'贵州',guangxi:'广西',hainan:'海南',neimenggu:'内蒙古',ningxia:'宁夏',xinjiang:'新疆',xizang:'西藏',qingdao:'青岛',ningbo:'宁波'};return m[sub]||sub;}
function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
</script>
