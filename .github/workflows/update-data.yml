name: Update Tax Data
# Runs daily + on manual trigger — fetches fresh NPC API results for 12 tax types

on:
  schedule:
    - cron: '0 2 * * *'   # 2am UTC daily
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install requests urllib3

      - name: Fetch tax data
        run: python .github/scripts/fetch_tax_data.py

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/
          git diff --staged --quiet || (git commit -m "data: auto-update tax search results" && git push)
