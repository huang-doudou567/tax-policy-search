<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>财税政策实时搜索引擎</title>
<style>
:root {
  --bg:#f3f4f6; --card:#fff; --text:#111827; --t2:#6b7280; --t3:#9ca3af;
  --border:#e5e7eb; --primary:#1d4ed8; --plight:#dbeafe;
  --green:#059669; --gbg:#d1fae5; --yellow:#b45309; --ybg:#fef3c7;
  --red:#dc2626; --rbg:#fee2e2; --radius:10px; --shadow:0 1px 3px #00000010;
  --panel-w:420px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);line-height:1.6}

.app{display:flex;min-height:100vh}
.main{flex:1;min-width:0;transition:margin .25s}
.main.with-panel{margin-right:var(--panel-w)}
@media(max-width:800px){.main.with-panel{margin-right:0;display:none}}

.header{background:linear-gradient(135deg,#0f172a,#1e3a8a);color:#fff;padding:22px 0 18px;text-align:center}
.header h1{font-size:22px;font-weight:700}
.header p{font-size:12.5px;opacity:.7;margin-top:4px}
.header .badges{display:flex;gap:8px;justify-content:center;margin-top:10px;flex-wrap:wrap}
.header .badge{background:#ffffff22;padding:3px 10px;border-radius:20px;font-size:11px}

.container{max-width:860px;margin:0 auto;padding:16px}

/* ── Search ── */
.search-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px 22px;margin-bottom:16px}
.search-row{display:flex;gap:10px;align-items:center}
.search-input{flex:1;padding:11px 15px;border:2px solid var(--border);border-radius:8px;font-size:15px;outline:none;transition:border .2s}
.search-input:focus{border-color:var(--primary)}
.search-btn{padding:11px 24px;background:var(--primary);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;white-space:nowrap}
.search-btn:hover{background:#1e40af}.search-btn:disabled{opacity:.5;cursor:not-allowed}
.quick-tax{display:flex;flex-wrap:wrap;gap:5px;margin-top:12px}
.quick-tax button{padding:5px 12px;border:1px solid var(--border);border-radius:20px;background:var(--card);font-size:12px;cursor:pointer;transition:all .12s}
.quick-tax button:hover{background:var(--plight);border-color:var(--primary)}
.quick-tax button .t{display:block;font-weight:600;font-size:13px}
.quick-tax button .s{display:block;font-size:10px;color:var(--t2)}
.filters{display:flex;gap:12px;margin-top:10px;flex-wrap:wrap;align-items:center}
.filter-group{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--t2)}
.filter-group select,.filter-group input{padding:5px 8px;border:1px solid var(--border);border-radius:5px;font-size:12px;outline:none;background:#fff}
.filter-group select:focus{border-color:var(--primary)}
.guidance-toggle{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--primary);cursor:pointer;margin-top:8px;width:fit-content}
.guidance-toggle:hover{text-decoration:underline}

/* ── Results ── */
.meta-bar{display:flex;align-items:center;gap:10px;margin-bottom:14px;font-size:12px;color:var(--t2);flex-wrap:wrap}
.tag{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500}
.tag-intent{background:#ede9fe;color:#7c3aed}.tag-source{background:var(--plight);color:var(--primary)}
.tag-time{background:#f3f4f6;color:#6b7280}.tag-count{background:var(--gbg);color:var(--green)}
.result-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px 20px;margin-bottom:10px;border-left:4px solid transparent;cursor:pointer;transition:all .15s}
.result-card:hover{border-left-color:var(--primary);box-shadow:0 2px 8px #00000012}
.result-card .title{font-size:15px;font-weight:600;margin-bottom:6px}
.result-card .meta{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:var(--t2)}
.result-card .meta span{display:inline-flex;align-items:center;gap:3px}
.result-card .id-row{font-size:10.5px;color:var(--t3);font-family:monospace;margin-top:4px}
.status-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.s-effective{background:var(--gbg);color:var(--green)}.s-amended{background:var(--ybg);color:var(--yellow)}
.s-abolished{background:var(--rbg);color:var(--red)}.s-pending{background:var(--plight);color:var(--primary)}
.empty-state,.loading-state{text-align:center;padding:50px 20px;color:var(--t2)}
.empty-state .icon{font-size:40px;margin-bottom:10px}
.loading-spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
.source-label{display:inline-flex;align-items:center;gap:2px;padding:1px 7px;border-radius:4px;font-size:10.5px;font-weight:600}
.src-npc{background:#dbeafe;color:#1e40af}.src-chinatax{background:#fef3c7;color:#92400e}.src-anysearch{background:#f3f4f6;color:#6b7280}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:#00000080;z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0}}
.modal{background:#fff;border-radius:12px;width:100%;max-width:900px;max-height:88vh;display:flex;flex-direction:column;box-shadow:0 20px 60px #00000030}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border);flex-shrink:0}
.modal-header h2{font-size:16px;margin:0;flex:1;padding-right:12px}
.modal-header .close-btn{width:32px;height:32px;border:none;background:none;font-size:22px;cursor:pointer;border-radius:6px;color:var(--t2)}
.modal-header .close-btn:hover{background:var(--bg)}
.modal-body{flex:1;overflow-y:auto;padding:0;font-size:14px;line-height:1.9;min-height:300px;position:relative}
.modal-body .tab-panel{display:none;min-height:300px}
.modal-body .tab-panel.active{display:block}
.modal-body .body-padded{padding:16px 24px}
.modal-footer{display:flex;gap:8px;padding:12px 20px;border-top:1px solid var(--border);flex-shrink:0;justify-content:flex-end}
.modal-footer button{padding:7px 16px;border:1px solid var(--border);border-radius:6px;font-size:13px;cursor:pointer;background:#fff}
.modal-footer button.primary{background:var(--primary);color:#fff;border-color:var(--primary)}

/* ── Tabs ── */
.modal-tabs{display:flex;border-bottom:2px solid var(--border);flex-shrink:0;padding:0 20px;background:#fafafa}
.modal-tabs .tab-btn{padding:10px 18px;border:none;background:none;font-size:13.5px;font-weight:500;color:var(--t2);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s}
.modal-tabs .tab-btn:hover{color:var(--text)}
.modal-tabs .tab-btn.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:600}

/* ── Tab: Law Text ── */
.modal-body mark{background:#fef08a;color:#854d0e;padding:0 2px;border-radius:2px}
.modal-body .chapter{font-weight:700;font-size:15px;margin:20px 0 10px;color:var(--primary);padding-bottom:4px;border-bottom:1px solid var(--border)}
.modal-body .chapter:first-child{margin-top:0}
.modal-body .article{font-weight:600;margin:14px 0 4px;color:#1f2937}
.modal-body .body-text{margin:2px 0;color:#374151;text-indent:2em}
.modal-body .meta-note{background:#f9fafb;padding:12px 16px;border-radius:6px;margin-bottom:16px;font-size:12px;color:var(--t2);display:flex;gap:16px;flex-wrap:wrap}

/* ── Tab: Interpretations ── */
.interp-card{display:block;padding:14px 18px;border-bottom:1px solid var(--border);text-decoration:none;color:var(--text);transition:background .12s}
.interp-card:hover{background:#f9fafb}
.interp-card .it{font-size:14px;font-weight:600;color:var(--primary);margin-bottom:4px}
.interp-card .im{font-size:12px;color:var(--t2);display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.interp-card .is{display:inline-flex;align-items:center;gap:2px;padding:1px 7px;border-radius:4px;font-size:10.5px;font-weight:600}
.is-official{background:var(--gbg);color:var(--green)}.is-practical{background:#fef3c7;color:#92400e}.is-web{background:#f3f4f6;color:#6b7280}
.interp-empty{text-align:center;padding:40px 20px;color:var(--t2)}

/* ── GUIDANCE PANEL ── */
.guidance-panel{position:fixed;top:0;right:0;bottom:0;width:var(--panel-w);background:#fff;box-shadow:-2px 0 12px #00000010;z-index:500;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .25s}
.guidance-panel.open{transform:translateX(0)}
.guidance-panel .gp-header{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--border);flex-shrink:0}
.guidance-panel .gp-header h3{font-size:16px}
.guidance-panel .gp-body{flex:1;overflow-y:auto;padding:18px}
.guidance-panel .gp-body .step{margin-bottom:20px}
.guidance-panel .gp-body .step-label{font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.guidance-panel .gp-body .step-question{font-size:14px;font-weight:600;margin-bottom:10px}
.guidance-panel .gp-body .choice-grid{display:flex;flex-wrap:wrap;gap:6px}
.guidance-panel .gp-body .choice{flex:1 1 calc(50% - 6px);min-width:100px;padding:14px 10px;border:2px solid var(--border);border-radius:8px;text-align:center;cursor:pointer;font-size:14px;transition:all .12s;background:#fff}
.guidance-panel .gp-body .choice:hover{border-color:var(--primary);background:var(--plight)}
.guidance-panel .gp-body .choice.picked{border-color:var(--primary);background:var(--plight);font-weight:600}
.guidance-panel .gp-body .choice .ci{font-size:22px;display:block;margin-bottom:4px}
.guidance-panel .gp-body .choice .cl{display:block;font-size:12px;color:var(--t2);margin-top:2px}
.guidance-panel .gp-footer{padding:14px 18px;border-top:1px solid var(--border);flex-shrink:0}
.guidance-panel .gp-footer button{width:100%;padding:10px;background:var(--primary);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer}
.guidance-panel .gp-footer button:disabled{opacity:.4;cursor:not-allowed}
.guidance-panel .gp-footer button:hover:not(:disabled){background:#1e40af}
.guidance-panel .gp-footer .reset{background:none;color:var(--t2);font-size:12px;margin-top:6px;width:100%}
.guidance-panel .gp-footer .reset:hover{color:var(--text)}

@media(max-width:800px){
  .guidance-panel{width:100%}
  .search-row{flex-direction:column}.filters{flex-direction:column;align-items:flex-start}
  .container{padding:10px}.search-card{padding:14px}
  .modal{max-width:100%;max-height:95vh;margin:10px}
  .modal-body .body-padded{padding:12px 16px}
}
</style>
</head>
<body>

<div class="header">
  <h1>财税政策实时搜索引擎</h1>
  <p>NPC 国家法律法规数据库 · 国家税务总局 · 18 个税种全覆盖 · 实时查询</p>
  <div class="badges">
    <span class="badge">实时查询</span><span class="badge">法律/行政法规</span>
    <span class="badge">部门规章</span><span class="badge">官方解读</span><span class="badge">法规原文</span>
  </div>
</div>

<div class="app">
<div class="main" id="mainContent">
<div class="container">

  <div class="search-card">
    <div class="search-row">
      <input type="text" class="search-input" id="searchInput"
        placeholder="输入税收政策关键词…如：小微企业增值税优惠、研发费用加计扣除比例…" autofocus>
      <button class="search-btn" id="searchBtn" onclick="doSearch()">搜索</button>
    </div>
    <div class="quick-tax" id="quickTax"></div>
    <div class="filters">
      <div class="filter-group"><label>范围</label><select id="filterScope"><option value="title">标题</option><option value="fulltext" selected>全文</option></select></div>
      <div class="filter-group"><label>匹配</label><select id="filterType"><option value="fuzzy">模糊</option><option value="exact">精确</option></select></div>
      <div class="filter-group"><label>时效</label><select id="filterStatus"><option value="3" selected>现行有效</option><option value="">全部</option></select></div>
      <div class="filter-group"><label>排序</label><select id="filterSort"><option value="relevance">相关度</option><option value="date">日期↓</option></select></div>
      <div class="filter-group"><label>数据源</label><select id="filterSource"><option value="npc">NPC法规库</option><option value="aggregated">多源聚合</option><option value="chinatax">税务总局</option></select></div>
      <div class="filter-group"><label>省份</label><select id="filterProvince"><option value="">全国</option></select></div>
      <div class="filter-group"><label>日期</label><input type="date" id="filterDateFrom">—<input type="date" id="filterDateTo"></div>
    </div>
    <div class="guidance-toggle" onclick="toggleGuidance()">💡 不确定查什么？打开智能引导</div>
  </div>

  <div id="resultsContainer"></div>

</div>
</div>

<div class="guidance-panel" id="guidancePanel">
  <div class="gp-header"><h3>💡 政策需求引导</h3><button style="background:none;border:none;font-size:20px;cursor:pointer;color:var(--t2)" onclick="toggleGuidance()">✕</button></div>
  <div class="gp-body" id="guideBody"></div>
  <div class="gp-footer" id="guideFooter"></div>
</div>

<div id="modalOverlay" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeModal()"></div>

</div>

<script>

/* ═══════════ API Base Auto-Detection ═══════════ */
const API_BASES = ['http://localhost:5080', 'https://deploy-vercel-lemon-mu.vercel.app'];
let API_BASE = API_BASES[1]; // default to Vercel
(async function detectAPI(){
  for(const base of API_BASES){
    try{
      const r = await fetch(base+'/api/health', {mode:'cors', signal: AbortSignal.timeout(3000)});
      if(r.ok){ API_BASE = base; console.log('API:',base); break; }
    }catch(e){}
  }
  // Re-trigger quick-tax load
  loadQuickTax();
})();

/* ═══════════ STATE ═══════════ */
let lastResults=[],lastKeyword='',guideState={},activeTab='law';
const NEXT_STEP={user_type:'tax_type',tax_type:'intent',intent:'conditions'};

document.addEventListener('DOMContentLoaded',()=>{
  loadQuickTax();loadProvinces();renderGuideStep('user_type');
  document.getElementById('searchInput').addEventListener('keydown',e=>{if(e.key==='Enter')doSearch();});
});

/* ═══════════ QUICK TAX ═══════════ */
async function loadQuickTax(){
  try{const types=await fetchWithRetry(API_BASE+'/api/quick-tax-types');
  document.getElementById('quickTax').innerHTML=types.map(t=>
    `<button onclick="pickTax('${t.keyword}')"><span class="t">${t.icon} ${t.label}</span><span class="s">${t.keyword}</span></button>`
  ).join('');
  }catch(e){
    document.getElementById('quickTax').innerHTML='<span style="font-size:12px;color:var(--t3)">快捷税种加载中…</span>';
  }
}
function pickTax(kw){document.getElementById('searchInput').value=kw;document.getElementById('searchInput').focus();}

async function loadProvinces(){
  const sel=document.getElementById('filterProvince');
  const provs=[{name:'全国',subdomain:''},{name:'北京',subdomain:'beijing'},{name:'上海',subdomain:'shanghai'},{name:'天津',subdomain:'tianjin'},{name:'重庆',subdomain:'chongqing'},{name:'广东',subdomain:'guangdong'},{name:'深圳',subdomain:'shenzhen'},{name:'浙江',subdomain:'zhejiang'},{name:'江苏',subdomain:'jiangsu'},{name:'山东',subdomain:'shandong'},{name:'四川',subdomain:'sichuan'},{name:'湖北',subdomain:'hubei'},{name:'湖南',subdomain:'hunan'},{name:'河南',subdomain:'henan'},{name:'河北',subdomain:'hebei'},{name:'福建',subdomain:'fujian'},{name:'厦门',subdomain:'xiamen'},{name:'安徽',subdomain:'anhui'},{name:'辽宁',subdomain:'liaoning'},{name:'大连',subdomain:'dalian'},{name:'吉林',subdomain:'jilin'},{name:'黑龙江',subdomain:'heilongjiang'},{name:'江西',subdomain:'jiangxi'},{name:'山西',subdomain:'shanxi'},{name:'陕西',subdomain:'shaanxi'},{name:'甘肃',subdomain:'gansu'},{name:'青海',subdomain:'qinghai'},{name:'云南',subdomain:'yunnan'},{name:'贵州',subdomain:'guizhou'},{name:'广西',subdomain:'guangxi'},{name:'海南',subdomain:'hainan'},{name:'内蒙古',subdomain:'neimenggu'},{name:'宁夏',subdomain:'ningxia'},{name:'新疆',subdomain:'xinjiang'},{name:'西藏',subdomain:'xizang'},{name:'青岛',subdomain:'qingdao'},{name:'宁波',subdomain:'ningbo'}];
  sel.innerHTML=provs.map(p=>`<option value="${p.subdomain}">${p.name}</option>`).join('');
}

/* ═══════════ SEARCH ═══════════ */
async function fetchWithRetry(url,opts={},retries=3,delay=800){
  // Auto-retry on network errors + empty responses (serveo tunnel instability)
  for(let i=0;i<retries;i++){
    try{
      const r=await fetch(url,opts);
      const text=await r.text();
      if(!text||text.trim()===''){
        if(i<retries-1){await new Promise(x=>setTimeout(x,delay*(i+1)));continue;}
        throw new Error('服务返回空响应，请刷新重试');
      }
      try{return JSON.parse(text);}catch(e){
        if(i<retries-1){await new Promise(x=>setTimeout(x,delay*(i+1)));continue;}
        throw new Error('响应格式异常: '+text.slice(0,80));
      }
    }catch(e){
      if(e.name==='TypeError'||e.message.includes('Failed to fetch')||e.message.includes('NetworkError')){
        if(i<retries-1){
          const c=document.getElementById('resultsContainer');
          c.innerHTML=`<div class="loading-state"><div class="loading-spinner"></div><p>连接不稳定，正在重试…</p><p style="font-size:12px;color:var(--t3)">第 ${i+2}/${retries} 次尝试</p></div>`;
          await new Promise(x=>setTimeout(x,delay*(i+1)));
          continue;
        }
        throw new Error('网络连接失败，请检查网络后刷新页面重试');
      }
      throw e;
    }
  }
  throw new Error('请求失败，已达最大重试次数');
}

async function doSearch(){
  const keyword=document.getElementById('searchInput').value.trim();if(!keyword)return;
  const c=document.getElementById('resultsContainer'),btn=document.getElementById('searchBtn');
  c.innerHTML=`<div class="loading-state"><div class="loading-spinner"></div><p>实时查询中…</p><p style="font-size:12px;color:var(--t3)">"${esc(keyword)}"</p></div>`;
  btn.disabled=true;btn.textContent='查询中…';
  try{
    const payload={
      keyword,scope:document.getElementById('filterScope').value,
      exact:document.getElementById('filterType').value==='exact',
      status:parseInt(document.getElementById('filterStatus').value)||null,
      sort:document.getElementById('filterSort').value,
      source:document.getElementById('filterSource').value,
      province:document.getElementById('filterProvince').value,
      date_from:document.getElementById('filterDateFrom').value||null,
      date_to:document.getElementById('filterDateTo').value||null,
    };
    const data=await fetchWithRetry(API_BASE+'/api/search',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    lastResults=data.result?.results||data.result?.items||[];lastKeyword=keyword;
    renderResults(data);
  }catch(e){c.innerHTML=`<div class="empty-state"><div class="icon">⚠️</div><p><b>查询失败</b></p><p style="font-size:13px">${esc(e.message)}</p><p style="font-size:12px;margin-top:8px;color:var(--t3)">已自动重试 3 次 · 请稍后再试</p></div>`}
  finally{btn.disabled=false;btn.textContent='搜索';}
}

function renderResults(data){
  const c=document.getElementById('resultsContainer'),result=data.result,items=result?.results||result?.items||[];
  const total=result?.total||result?.total_items||items.length,searchedAt=result?.searched_at||'';
  const cacheTag=result?._from_cache?' [缓存]':'';
  const srcLabels={npc:'NPC国家法规库',chinatax:'国家税务总局',anysearch:'AnySearch'};
  const srcIcons={npc:'📜',chinatax:'🏛️',anysearch:'🌐'};
  const statusMap={1:'s-abolished',2:'s-amended',3:'s-effective',4:'s-pending'};
  const statusIcons={1:'🔴',2:'🟡',3:'🟢',4:'🔵'};
  const statusNames={1:'已废止',2:'已修改',3:'现行有效',4:'尚未生效'};

  let h='';
  if(items.length>0||total>0){
    h+='<div class="meta-bar">';
    if(data.intent_label)h+=`<span class="tag tag-intent">🎯 ${data.intent_label}</span>`;
    if(data.tax_type)h+=`<span class="tag tag-source">📂 ${data.tax_type}</span>`;
    if(data.province)h+=`<span class="tag" style="background:#fef3c7;color:#92400e">📍 ${getProvinceName(data.province)}</span>`;
    h+=`<span class="tag tag-count">📋 ${total}条</span>`;
    if(searchedAt)h+=`<span class="tag tag-time">🕐 ${searchedAt}${cacheTag}</span>`;
    h+='</div>';
  }
  if(result?.source_summary){const s=result.source_summary;h+='<div class="meta-bar">';if(s.npc)h+=`<span class="source-label src-npc">📜 NPC ${s.npc}条</span>`;if(s.chinatax)h+=`<span class="source-label src-chinatax">🏛️ 总局 ${s.chinatax}条</span>`;if(s.anysearch)h+=`<span class="source-label src-anysearch">🌐 网页 ${s.anysearch}条</span>`;h+='</div>';}

/* ═══════════ KEYWORD HIGHLIGHT ═══════════ */
function highlightText(text,kw){if(!kw||!text)return esc(text);let r=esc(text);const tokens=kw.split(/\s+/).filter(t=>t.length>=1).sort((a,b)=>b.length-a.length);tokens.forEach(t=>{const e=t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');r=r.replace(new RegExp(`(${e})`,'gi'),'<mark>$1</mark>');});return r;}

function renderLawTextTab(data,bbbsId,title){
  const d=data.detail,kw=lastKeyword;
  let body=`<div class="meta-note"><span>📅 公布:${d.publish_date||'?'}</span><span>施行:${d.effective_date||'?'}</span><span>${['','🔴已废止','🟡已修改','🟢现行有效','🔵尚未生效'][d.status_code||3]||''}</span><span>🏛️ ${d.issuing_authority||''}</span><span>📝 ${data.article_count}条法条</span>${kw?`<span>🔍 高亮:"${esc(kw)}"</span>`:''}</div>`;
  if(!data.sections||data.sections.length===0){body+='<div class="interp-empty">未能获取法规全文</div>';}
  else{data.sections.forEach(s=>{const h=highlightText(s.text,kw);if(s.type==='chapter')body+=`<div class="chapter">${h}</div>`;else if(s.type==='heading')body+=`<div class="chapter" style="font-size:13px;border:none;margin:8px 0 4px">${h}</div>`;else if(s.type==='article')body+=`<div class="article">${h}</div>`;else if(s.text.trim())body+=`<div class="body-text">${h}</div>`;});}

function switchTab(tab){
  activeTab=tab;
  // Hide all panels, show only active one using CSS class
  document.querySelectorAll('.modal-body .tab-panel').forEach(el=>el.classList.remove('active'));
  const panel=document.getElementById('tab'+tab.charAt(0).toUpperCase()+tab.slice(1)+'Content');
  if(panel)panel.classList.add('active');
  // Update tab buttons
  document.querySelectorAll('.modal-tabs .tab-btn').forEach(b=>b.classList.remove('active'));
  const btn=document.getElementById('tabBtn'+tab.charAt(0).toUpperCase()+tab.slice(1));
  if(btn)btn.classList.add('active');
  // Lazy load
  if(tab==='interp')loadInterpretationsTab(_modalLawId);
  if(tab==='web')loadWebRelatedTab(_modalLawId,_modalTitle);
  // Footer info
  const footerLabels={law:'实时获取自NPC国家法规库',interp:'搜索自 chinatax.gov.cn · mof.gov.cn · gov.cn（仅官方来源）',ai:'AI 生成 · 仅供参考 · 以官方为准',web:'搜索自公众号 + 实务网络（含小颖言税/税海涛声/会计网等）'};
  document.getElementById('footerInfo').textContent=footerLabels[tab]||'';
}

function executeGuidedSearch(){const taxMap={vat:'增值税',cit:'企业所得税',iit:'个人所得税',invoice:'发票管理办法',prefer:'税收优惠',stamp:'印花税',deed:'契税',property:'房产税',consumption:'消费税',tariff:'关税',land_vat:'土地增值税',admin:'税收征收管理法'};const intentMap={policy:'',preference:'优惠',risk:'风险 合规',filing:'申报',invoice:'发票',calc:'标准 扣除'};const entMap={small:'小规模纳税人',general:'一般纳税人',micro:'小微企业',hitech:'高新技术企业'};let parts=[];const taxK=guideState.tax_type?taxMap[guideState.tax_type]||guideState.tax_type:'';if(taxK)parts.push(taxK);if(guideState.intent&&intentMap[guideState.intent])parts.push(intentMap[guideState.intent]);if(guideState.enterprise_type&&entMap[guideState.enterprise_type])parts.push(entMap[guideState.enterprise_type]);const custom=document.getElementById('customKeyword')?.value?.trim();if(custom)parts.push(custom);document.getElementById('searchInput').value=parts.join(' ')||'增值税';if(guideState.timeframe==='latest')document.getElementById('filterSort').value='date';if(guideState.timeframe==='2024')document.getElementById('filterDateFrom').value='2024-01-01';if(guideState.region==='local')document.getElementById('filterStatus').value='';toggleGuidance();doSearch();}

function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
