<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>财税政策实时搜索引擎</title>
<style>
*{margin:0;padding:0}
body,html{width:100%;height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif}
#loading{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#f3f4f6;z-index:9999;transition:opacity .4s}
#loading.done{opacity:0;pointer-events:none}
#loading .spinner{width:40px;height:40px;border:3px solid #e5e7eb;border-top-color:#1d4ed8;border-radius:50%;animation:spin .7s linear infinite;margin-bottom:16px}
@keyframes spin{to{transform:rotate(360deg)}}
#loading p{color:#6b7280;font-size:14px}
#loading .err{color:#dc2626;font-size:12px;margin-top:8px;display:none}
#iframe{width:100%;height:100%;border:none}
</style>
</head>
<body>
<div id="loading">
  <div class="spinner"></div>
  <p>财税政策实时搜索引擎正在连接…</p>
  <p class="err" id="loadErr"></p>
</div>
<iframe id="iframe" src="" allow="clipboard-read;clipboard-write"></iframe>

<script>
const BACKENDS = [
  { url: 'http://localhost:5080', label: '本地服务', timeout: 2000 },
  { url: 'https://0a37d8d71373ad22-218-75-157-37.serveousercontent.com', label: '在线 Demo', timeout: 8000 },
  { url: 'https://deploy-vercel-lemon-mu.vercel.app', label: 'Vercel 备用', timeout: 12000 },
];

(async function init() {
  var iframe = document.getElementById('iframe');
  var loading = document.getElementById('loading');
  var loadErr = document.getElementById('loadErr');

  for (var i = 0; i < BACKENDS.length; i++) {
    var backend = BACKENDS[i];
    try {
      var ctrl = new AbortController();
      var timer = setTimeout(function() { ctrl.abort(); }, backend.timeout);
      var r = await fetch(backend.url + '/api/health', { signal: ctrl.signal });
      clearTimeout(timer);
      if (r.ok) {
        iframe.src = backend.url;
        iframe.onload = function() { loading.classList.add('done'); };
        setTimeout(function() { loading.classList.add('done'); }, 5000);
        return;
      }
    } catch(e) {}
  }

  loadErr.style.display = 'block';
  loadErr.textContent = '所有后端暂不可用，请稍后刷新重试';
  loading.innerHTML = '<p style="font-size:16px;color:#111827">⚠️ 服务暂时不可用</p><p class="err">请稍后刷新页面重试</p>';
})();
</script>
</body>
</html>
