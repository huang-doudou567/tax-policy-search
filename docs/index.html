<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>财税政策实时搜索引擎</title>
<style>
*{margin:0;padding:0}
body,html{width:100%;height:100%;overflow:hidden}
iframe{width:100%;height:100%;border:none}
</style>
</head>
<body>
<script src="current-tunnel.js?v=1"></script>
<script>
(function(){
  var url = window.SERVEO_URL;
  if(!url){ document.body.innerHTML='<p style="padding:40px;font-family:sans-serif">Demo 暂不可用，请稍后刷新</p>'; return; }
  var iframe = document.createElement('iframe');
  iframe.src = url;
  iframe.allow = 'clipboard-write';
  document.body.appendChild(iframe);
  // Update page title when iframe loads
  iframe.onload = function(){
    try{ var t = iframe.contentDocument.title; if(t) document.title = t; }catch(e){}
  };
})();
</script>
</body>
</html>
