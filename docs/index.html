<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>财税政策实时搜索引擎</title>
<style>
*{margin:0;padding:0}
body,html{width:100%;height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif}
#loading{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#f3f4f6;z-index:9999;transition:opacity .3s}
#loading.done{opacity:0;pointer-events:none}
.spinner{width:36px;height:36px;border:3px solid #e5e7eb;border-top-color:#1d4ed8;border-radius:50%;animation:spin .7s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}
#status{color:#6b7280;font-size:14px}
#iframe{width:100%;height:100%;border:none}
</style>
</head>
<body>
<div id="loading">
  <div class="spinner"></div>
  <p id="status">正在连接服务…</p>
</div>
<iframe id="iframe" src="" allow="clipboard-read;clipboard-write"></iframe>

<script>
(function(){
  var TUNNEL = 'https://1415ec40105fbd4b-223-150-180-191.serveousercontent.com';
  var FALLBACK = 'https://deploy-vercel-lemon-mu.vercel.app';
  var iframe = document.getElementById('iframe');
  var loading = document.getElementById('loading');
  var statusEl = document.getElementById('status');

  // Quick health check on tunnel in parallel
  var checked = false;
  var timer = setTimeout(function(){
    // After 3s, just load regardless — iframe will show error if truly down
    if (!checked) { iframe.src = TUNNEL; checked = true; }
    loading.classList.add('done');
  }, 3000);

  // Try tunnel health
  fetch(TUNNEL + '/api/health').then(function(r){
    return r.ok;
  }).catch(function(){ return false; }).then(function(ok){
    if (checked) return;
    checked = true;
    clearTimeout(timer);
    statusEl.textContent = ok ? '服务已连接 ✓' : '连接较慢，正在加载…';
    iframe.src = ok ? TUNNEL : FALLBACK;
    setTimeout(function(){ loading.classList.add('done'); }, ok ? 600 : 1500);
  });

  // Hide loading once iframe content loads
  iframe.onload = function(){ loading.classList.add('done'); };
})();
</script>
</body>
</html>
